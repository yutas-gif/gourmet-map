<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIエージェント組織</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
#app{display:flex;height:720px;width:1020px;border:1px solid #e0ddd8;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.08)}

/* sidebar */
#sidebar{width:230px;min-width:230px;border-right:1px solid #e0ddd8;display:flex;flex-direction:column;background:#f9f8f5}
#sb-top{padding:14px 14px 8px;border-bottom:1px solid #e0ddd8}
#sb-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#sb-title{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em}
#dash-btn{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-weight:500}
#dash-btn:hover{background:#f0ede8}
#sb-filter{display:flex;gap:4px}
.sf-btn{flex:1;padding:5px 4px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid transparent;background:transparent;color:#aaa;font-weight:500}
.sf-btn.active{background:#fff;color:#1a1a1a;border-color:#ddd}
#proj-list{flex:1;overflow-y:auto;padding:8px}
.pi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:3px;position:relative}
.pi:hover{background:#fff}
.pi.active{background:#fff;border:1px solid #ddd}
.pi.archived{opacity:.6}
.pi-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;cursor:pointer}
.pi-icon:hover{opacity:.7}
.pi-body{flex:1;min-width:0}
.pi-name{font-size:12px;font-weight:600;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-sub{font-size:10px;color:#bbb;margin-top:1px}
.pi-status{font-size:9px;padding:2px 5px;border-radius:5px;font-weight:600;flex-shrink:0}
.pi-status.active-s{background:#e8f8f2;color:#085041}
.pi-status.archived-s{background:#f0ede8;color:#888}
.pi-edit-btn{opacity:0;font-size:10px;color:#bbb;background:transparent;border:none;cursor:pointer;padding:2px 4px;border-radius:4px}
.pi:hover .pi-edit-btn{opacity:1}
.pi-edit-btn:hover{color:#555;background:#eee}
#add-p-wrap{padding:8px 8px 4px}
#add-p{width:100%;padding:8px;border-radius:10px;border:1.5px dashed #ddd;background:transparent;color:#999;font-size:12px;cursor:pointer;text-align:center}
#add-p:hover{background:#fff}
#new-proj-form{display:none;flex-direction:column;gap:6px;padding:8px 8px 4px}
#new-proj-form input{font-size:13px;padding:7px 10px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none;width:100%}
.npf-btns{display:flex;gap:5px}
.npf-btns button{flex:1;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
.npf-ok{border:none;background:#1a1a1a;color:#fff}
.npf-cancel{border:1px solid #ddd;background:#fff;color:#888}
.save-indicator{font-size:10px;color:#bbb;padding:6px 10px;text-align:center;border-top:1px solid #f0ede8;flex-shrink:0}

/* main */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#mh{padding:12px 18px;border-bottom:1px solid #e0ddd8;display:flex;align-items:center;gap:10px}
#ptitle-wrap{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
#ptitle{font-size:15px;font-weight:600;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ptitle-input{display:none;font-size:14px;font-weight:600;padding:4px 8px;border-radius:8px;border:1px solid #ddd;color:#1a1a1a;outline:none;flex:1}
.hdr-btn{padding:5px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#888;font-size:11px;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
.hdr-btn:hover{background:#f5f5f0;color:#555}
.hdr-btn.danger:hover{background:#fef0f0;color:#c00;border-color:#f5c0c0}
.archived-banner{font-size:11px;padding:3px 10px;border-radius:7px;background:#f0ede8;color:#888;font-weight:500;flex-shrink:0}
#tabs{display:flex;gap:3px;background:#f5f5f0;padding:3px;border-radius:9px;flex-shrink:0}
.tab{padding:5px 13px;border-radius:7px;font-size:12px;cursor:pointer;color:#888;background:transparent;border:none;font-weight:500}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.08)}

.panel{display:none;flex:1;overflow-y:auto;padding:14px 18px;flex-direction:column}
.panel.active{display:flex}
.slabel{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.06em;margin-bottom:7px;margin-top:4px}
.pbw{height:5px;background:#f0ede8;border-radius:3px;margin-bottom:12px}
.pbf{height:100%;border-radius:3px;background:#1D9E75;transition:width .4s}

/* tasks */
.ti{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:1px solid #eee;border-radius:10px;margin-bottom:6px;background:#fff}
.ti:hover{border-color:#ddd}
.tcb{width:15px;height:15px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#1D9E75;margin-top:2px}
.tcb.done{background:#e8f8f2;border-color:#1D9E75}
.ti-body{flex:1;min-width:0}
.tl{font-size:13px;color:#1a1a1a;line-height:1.4}
.tl.done{color:#bbb;text-decoration:line-through}
.ti-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.pri-badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600}
.pri-high{background:#fef0f0;color:#c00}
.pri-mid{background:#fef8ec;color:#a06000}
.pri-low{background:#f0f7ff;color:#0060a0}
.due-label{font-size:10px;color:#bbb}
.due-label.overdue{color:#c00;font-weight:600}
.dep-label{font-size:10px;color:#9988dd;background:#f0eeff;padding:1px 6px;border-radius:6px}
.ti-actions{display:flex;gap:3px;opacity:0;flex-shrink:0}
.ti:hover .ti-actions{opacity:1}
.ti-act-btn{background:transparent;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:2px 5px;border-radius:4px}
.ti-act-btn:hover{color:#555;background:#eee}
.add-task-area{border:1px solid #eee;border-radius:10px;padding:11px;margin-top:4px;background:#f9f8f5}
.add-task-row{display:flex;gap:7px;margin-bottom:7px}
.add-task-row input{flex:1;font-size:13px;padding:7px 10px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}
.add-task-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.add-task-meta select,.add-task-meta input[type=date]{font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none;cursor:pointer}
.add-task-meta button{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
.ai-task-btn{border:1.5px dashed #b0aaee;background:#faf9ff;color:#534AB7;padding:6px 11px;border-radius:9px;font-size:12px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:9px;align-self:flex-start}
.ai-task-btn:hover{background:#f0eeff}
.add-btn{border:none;background:#1a1a1a;color:#fff}
.add-btn:hover{background:#333}

/* agents */
.ac{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid #eee;border-radius:10px;margin-bottom:6px;background:#fff}
.ac:hover{border-color:#ddd}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ai2{flex:1;min-width:0}
.an{font-size:13px;font-weight:600;color:#1a1a1a}
.ad{font-size:11px;color:#bbb;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.abadge{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:600;flex-shrink:0}
.model-badge{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600;flex-shrink:0}
.model-claude{background:#EEEDFE;color:#3C3489}
.model-gemini{background:#E1F5EE;color:#085041}
.a-btns{display:flex;gap:3px;opacity:0}
.ac:hover .a-btns{opacity:1}
.a-btn{background:transparent;border:none;cursor:pointer;color:#bbb;font-size:12px;padding:2px 5px;border-radius:4px}
.a-btn:hover{color:#555;background:#eee}
.a-btn.del:hover{color:#e24b4a;background:#fef0f0}
.aas{border:1px solid #eee;border-radius:12px;padding:12px;margin-top:8px;background:#f9f8f5}
.aatabs{display:flex;gap:4px;margin-bottom:10px;background:#eeecea;padding:3px;border-radius:9px}
.aatab{padding:4px 10px;border-radius:7px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#888;font-weight:500}
.aatab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pchip{padding:7px 5px;border-radius:9px;border:1px solid #eee;background:#fff;font-size:11px;cursor:pointer;text-align:center}
.pchip:hover:not(.dis){border-color:#bbb;background:#f9f8f5}
.pchip.dis{opacity:.35;cursor:not-allowed}
.pchip-n{font-weight:600;font-size:11px;color:#1a1a1a}
.pchip-d{font-size:10px;color:#bbb;margin-top:1px;line-height:1.3}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cdot.sel{border-color:#555}
.cf{display:flex;flex-direction:column;gap:7px}
.cf input{font-size:13px;padding:7px 10px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}

/* suggest */
.suggest-box{border:1.5px solid #7F77DD;border-radius:12px;padding:12px;margin-bottom:10px;background:#faf9ff}
.suggest-title{font-size:13px;font-weight:600;color:#3C3489;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.suggest-reason{font-size:12px;color:#555;line-height:1.6;margin-bottom:9px;padding:8px 10px;background:#fff;border-radius:8px;border:1px solid #eee}
.suggest-agent-row{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;background:#fff;border:1px solid #eee;margin-bottom:4px}
.s-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.s-an{font-size:12px;font-weight:600;color:#1a1a1a;flex:1}
.s-ar{font-size:10px;color:#bbb}
.suggest-btns{display:flex;gap:6px;margin-top:9px}
.sug-apply{flex:1;padding:8px;border-radius:9px;border:none;background:#3C3489;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.sug-apply:hover{background:#534AB7}
.sug-dismiss{padding:8px 12px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#888;font-size:12px;cursor:pointer}
.ai-suggest-trigger{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:10px;border:1.5px dashed #b0aaee;background:#faf9ff;cursor:pointer;margin-bottom:8px;color:#534AB7;font-size:12px;font-weight:500}
.ai-suggest-trigger:hover{background:#f0eeff}

/* chat */
#ca{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:6px}
.msg{display:flex;gap:8px;align-items:flex-start}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.mb{flex:1;min-width:0}
.mh2{display:flex;align-items:baseline;gap:5px;margin-bottom:3px}
.mn{font-size:12px;font-weight:600;color:#1a1a1a}
.mt2{font-size:10px;color:#ccc}
.mx{font-size:13px;color:#1a1a1a;line-height:1.6;background:#f9f8f5;padding:8px 11px;border-radius:10px;border:1px solid #eee}
.msg.usr .mx{background:#edf4fd;border-color:#c8dff7}
.msg.summary .mx{background:#f0eeff;border-color:#c8bfee;font-style:italic}
.msg.risk .mx{background:#fff8ec;border-color:#f5d88c}
.chat-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-shrink:0;flex-wrap:wrap}
.dbb{padding:5px 11px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#888;font-size:11px;cursor:pointer;font-weight:500;white-space:nowrap}
.dbb:hover{background:#f5f5f0;color:#555}
.mention-picker{position:relative;display:inline-block}
.mention-dropdown{display:none;position:absolute;top:calc(100%+4px);left:0;background:#fff;border:1px solid #ddd;border-radius:10px;padding:5px;min-width:150px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100}
.mention-dropdown.open{display:block}
.mention-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:#1a1a1a}
.mention-item:hover{background:#f5f5f0}
.m-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.cir{display:flex;gap:7px;padding-top:10px;border-top:1px solid #eee;flex-shrink:0;align-items:center}
.cir input{flex:1;font-size:13px;padding:8px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}
.cir button{padding:8px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
.cir button:hover:not(:disabled){background:#f5f5f0}
.cir button:disabled{opacity:.4;cursor:not-allowed}
.typ{display:flex;align-items:center;gap:4px;font-size:12px;color:#bbb;padding:4px 0}
.dot{width:4px;height:4px;border-radius:50%;background:#ccc;animation:bn 1s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* dashboard */
#dash-panel{display:none;flex:1;overflow-y:auto;padding:16px 18px;flex-direction:column}
#dash-panel.active{display:flex}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-stat{background:#f9f8f5;border-radius:12px;padding:14px;text-align:center}
.dash-stat-n{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1}
.dash-stat-l{font-size:11px;color:#bbb;margin-top:6px}
.dash-proj-card{border:1px solid #eee;border-radius:12px;padding:13px;margin-bottom:8px;background:#fff;cursor:pointer}
.dash-proj-card:hover{border-color:#ddd}
.dash-proj-header{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.dash-proj-name{font-size:13px;font-weight:600;color:#1a1a1a;flex:1}
.dash-pct{font-size:12px;font-weight:600;color:#1D9E75}
.dash-pbw{height:4px;background:#f0ede8;border-radius:2px;margin-bottom:6px}
.dash-pbf{height:100%;border-radius:2px;background:#1D9E75}
.dash-meta{display:flex;gap:8px;font-size:11px;color:#bbb}
.week-report-btn{display:flex;align-items:center;gap:7px;padding:10px 13px;border-radius:10px;border:1.5px dashed #b0aaee;background:#faf9ff;cursor:pointer;color:#534AB7;font-size:12px;font-weight:500;margin-bottom:14px;align-self:flex-start}
.week-report-btn:hover{background:#f0eeff}
.report-box{border:1.5px solid #7F77DD;border-radius:12px;padding:14px;background:#faf9ff;margin-bottom:14px}
.report-box h4{font-size:13px;font-weight:600;color:#3C3489;margin-bottom:10px}
.report-content{font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap}

/* modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:14px;padding:20px;width:380px;max-height:80vh;overflow-y:auto;border:1px solid #eee;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:14px}
.modal-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.modal-field label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.05em}
.modal-field input,.modal-field select,.modal-field textarea{font-size:13px;padding:8px 10px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-ok{flex:1;padding:9px;border-radius:9px;border:none;background:#1a1a1a;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.modal-ok:hover{background:#333}
.modal-cancel{padding:9px 14px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#888;font-size:13px;cursor:pointer}
.modal-danger{padding:9px 14px;border-radius:9px;border:none;background:#c00;color:#fff;font-size:13px;cursor:pointer}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:5px}
.icon-opt{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:1.5px solid transparent}
.icon-opt:hover{background:#f5f5f0}
.icon-opt.sel{border-color:#1a1a1a;background:#f0ede8}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:2000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <div id="sidebar">
    <div id="sb-top">
      <div id="sb-top-row">
        <span id="sb-title">プロジェクト</span>
        <button id="dash-btn" onclick="showDash()">ダッシュボード</button>
      </div>
      <div id="sb-filter">
        <button class="sf-btn active" onclick="setFilter('all',this)">すべて</button>
        <button class="sf-btn" onclick="setFilter('active',this)">進行中</button>
        <button class="sf-btn" onclick="setFilter('archived',this)">アーカイブ</button>
      </div>
    </div>
    <div id="proj-list"></div>
    <div id="add-p-wrap"><button id="add-p" onclick="showNewProjForm()">+ 新規プロジェクト</button></div>
    <div id="new-proj-form">
      <input id="np-input" placeholder="プロジェクト名を入力..." onkeydown="if(event.key==='Enter')confirmNewProj();if(event.key==='Escape')hideNewProjForm()"/>
      <div class="npf-btns">
        <button class="npf-ok" onclick="confirmNewProj()">作成</button>
        <button class="npf-cancel" onclick="hideNewProjForm()">キャンセル</button>
      </div>
    </div>
    <div style="padding:8px;border-top:1px solid #f0ede8">
  <div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:.05em;margin-bottom:6px">API設定</div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="display:flex;align-items:center;gap:5px">
      <span style="font-size:10px;color:#bbb;width:52px;flex-shrink:0">Claude</span>
      <input id="key-claude" type="password" placeholder="sk-ant-..." style="flex:1;font-size:10px;padding:4px 7px;border-radius:6px;border:1px solid #e0ddd8;background:#fff;color:#1a1a1a;outline:none;min-width:0"/>
    </div>
    <div style="display:flex;align-items:center;gap:5px">
      <span style="font-size:10px;color:#bbb;width:52px;flex-shrink:0">Gemini</span>
      <input id="key-gemini" type="password" placeholder="AIza..." style="flex:1;font-size:10px;padding:4px 7px;border-radius:6px;border:1px solid #e0ddd8;background:#fff;color:#1a1a1a;outline:none;min-width:0"/>
    </div>
    <button onclick="saveKeys()" style="padding:5px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;font-size:11px;cursor:pointer;font-weight:500;margin-top:2px">保存</button>
  </div>
</div>
<div class="save-indicator" id="save-indicator">自動保存済み</div>
  </div>

  <div id="main">
    <!-- dashboard -->
    <div id="dash-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:16px;font-weight:600;color:#1a1a1a">ダッシュボード</span>
        <button class="hdr-btn" onclick="hideDash()">← プロジェクトへ</button>
      </div>

function saveData(){

  }catch(e){}
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>syncToSheets(),1000);
}

async function syncToSheets(){
  try{
    await fetch(GAS_URL,{
      method:'POST',
      mode:'no-cors',
      body:JSON.stringify(projects),
      headers:{'Content-Type':'text/plain'}
    });
    document.getElementById('save-indicator').textContent='クラウド保存済み ✓';
    setTimeout(()=>{document.getElementById('save-indicator').textContent='自動保存済み';},2000);
  }catch(e){
    document.getElementById('save-indicator').textContent='ローカル保存済み';
  }
}

function loadFromSheets(){
  return new Promise((resolve)=>{
    document.getElementById('save-indicator').textContent='クラウドから読込中...';
    fetch(GAS_URL+'?t='+Date.now())
      .then(r=>r.json())
      .then(json=>{
        if(json.ok&&Array.isArray(json.data)&&json.data.length>0){
          projects=json.data;
          localStorage.setItem('ai-agent-org-v4',JSON.stringify(projects));
          document.getElementById('save-indicator').textContent='クラウドから読込完了 ✓';
          setTimeout(()=>{document.getElementById('save-indicator').textContent='自動保存済み';},2000);
          resolve(true);
        }else{
          document.getElementById('save-indicator').textContent='ローカルデータを使用中';
          resolve(false);
        }
      })
      .catch(()=>{
        document.getElementById('save-indicator').textContent='ローカルデータを使用中';
        resolve(false);
      });
  });
}

let cur=null,tab='tasks',thinking=false,amode='preset',selPal=0,suggestion=null,mentionTarget=null,projFilter='all';
let dashMode=false;

// ---- sidebar ----
function setFilter(f,btn){

function renderSB(){

// ---- archive / delete / reopen ----
function archiveProject(){

(async()=>{

    // localStorageのデータをそのまま使用
  }

// ---- title edit ----
function startEditTitle(){

function saveTitle(){
  const ti=document.getElementById('ptitle-input');const v=ti.value.trim();

function setIcon(id,icon){const p=projects.find(x=>x.id===id);if(!p)return;p.icon=icon;saveData();closeModal();renderSB();if(cur&&cur.id===id)renderCur();}

function editProjName(id){

// ---- modal ----
function showModal(html){closeModal();const ov=document.createElement('div');ov.className='modal-overlay';ov.id='modal-overlay';ov.innerHTML=`<div class="modal">${html}</div>`;ov.onclick=e=>{if(e.target===ov)closeModal();};document.body.appendChild(ov);}
function closeModal(){const m=document.getElementById('modal-overlay');if(m)m.remove();}

// ---- export ----
function exportProject(){
  if(!cur)return;
  const lines=[`# ${cur.name}`,`ステータス: ${cur.archived?'アーカイブ済み':'進行中'}`,``,`## タスク`];
  cur.tasks.forEach(t=>lines.push(`- [${t.done?'x':' '}] [${t.priority}] ${t.text}${t.due?' (期日:'+t.due+')':''}${t.dep?` (依存:#${t.dep})`:''}` ));
  lines.push(``,`## エージェント`);cur.agents.forEach(a=>lines.push(`- ${a.name}: ${a.desc}`));
  lines.push(``,`## チャットログ`);cur.chat.forEach(m=>lines.push(`[${m.time}] ${m.role==='user'?'あなた':m.aname}: ${m.text}`));
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${cur.name}.txt`;a.click();toast('エクスポートしました');
}

function renderDash(){

    <div class="dash-stat"><div class="dash-stat-n">${allTasks.length?Math.round(doneTasks.length/allTasks.length*100):0}%</div><div class="dash-stat-l">全体タスク完了率</div></div>`;
  document.getElementById('dash-proj-list').innerHTML=projects.map(p=>{
    const d=p.tasks.filter(t=>t.done).length;

    </div>`;
  }).join('');
}

async function genWeekReport(){
  const btn=document.querySelector('.week-report-btn');btn.textContent='✦ 生成中...';btn.disabled=true;
  const summary=projects.map(p=>{
    const d=p.tasks.filter(t=>t.done).length;
    const pct=p.tasks.length?Math.round(d/p.tasks.length*100):0;
    return`プロジェクト「${p.name}」(${p.archived?'アーカイブ':'進行中'}): 進捗${pct}%, タスク${d}/${p.tasks.length}完了`;
  }).join('\n');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ckey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:500,messages:[{role:'user',content:`以下のプロジェクト状況を元に、週次レポートを日本語で作成してください。全体の評価、各プロジェクトの状況、今週のおすすめアクションを含めてください:\n${summary}`}]})});
    const d=await r.json();
    const txt=d.content?.[0]?.text||'生成できませんでした';
    document.getElementById('week-report-area').innerHTML=`<div class="report-box"><h4>✦ 週次レポート</h4><div class="report-content">${txt}</div></div>`;
  }catch(e){toast('レポート生成に失敗しました');}
  btn.textContent='✦ 週次レポートをAIに生成させる';btn.disabled=false;
}

  renderCur();
}
function renderCur(){if(!cur)return;if(tab==='tasks')renderT();else if(tab==='agents')renderA();else renderC();}

// ---- tasks ----
function renderT(){
  const d=cur.tasks.filter(t=>t.done).length,pct=cur.tasks.length?Math.round(d/cur.tasks.length*100):0;
  const today=new Date().toISOString().slice(0,10);
  const priMap={high:{cls:'pri-high',lbl:'高'},mid:{cls:'pri-mid',lbl:'中'},low:{cls:'pri-low',lbl:'低'}};
  const taskHTML=cur.tasks.map((t,i)=>{
    const pm=priMap[t.priority]||priMap.mid;
    const overdue=t.due&&t.due<today&&!t.done;
    const depTask=t.dep?cur.tasks.find(x=>x.id===t.dep):null;
    const blocked=depTask&&!depTask.done;
    return`<div class="ti" style="${blocked?'opacity:.6':''}">
      <div class="tcb${t.done?' done':''}" onclick="${blocked?'toast(\'依存タスクが未完了です\')':'togT('+i+')'}">${t.done?'✓':''}</div>
      <div class="ti-body">
        <div class="tl${t.done?' done':''}">${t.text}${blocked?' 🔒':''}</div>
        <div class="ti-meta">
          <span class="pri-badge ${pm.cls}">${pm.lbl}</span>
          ${t.due?`<span class="due-label${overdue?' overdue':''}">${overdue?'⚠ ':''} ${t.due}</span>`:''}
          ${depTask?`<span class="dep-label">← ${depTask.text}</span>`:''}
        </div>
      </div>
      <div class="ti-actions">
        <button class="ti-act-btn" onclick="editTask(${i})">✎</button>
        <button class="ti-act-btn" onclick="deleteTask(${i})" style="color:#eaa">✕</button>
      </div>
    </div>`;
  }).join('');

  const depOptions=cur.tasks.map((t,i)=>`<option value="${t.id}">${t.text}</option>`).join('');

  document.getElementById('panel-tasks').innerHTML=`
    <div class="slabel">進捗</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="pbw" style="flex:1"><div class="pbf" style="width:${pct}%"></div></div><span style="font-size:12px;color:#bbb;min-width:60px">${d}/${cur.tasks.length} (${pct}%)</span></div>
    ${cur.archived?`<div style="padding:9px 12px;background:#f9f8f5;border-radius:9px;font-size:12px;color:#888;margin-bottom:10px">📦 アーカイブ済み — タスクや内容は自由に修正・更新できます</div>`:''}
    <div class="slabel">タスク一覧</div>
    ${taskHTML}
    <div class="add-task-area">
      <button class="ai-task-btn" onclick="aiGenerateTasks()">✦ AIにタスクを提案してもらう</button>
      <div class="add-task-row"><input id="nt" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addT()"/></div>
      <div class="add-task-meta">
        <select id="t-pri"><option value="high">優先度：高</option><option value="mid" selected>優先度：中</option><option value="low">優先度：低</option></select>
        <input type="date" id="t-due"/>
        <select id="t-dep"><option value="">依存なし</option>${depOptions}</select>
        <button class="add-btn" onclick="addT()">追加</button>
      </div>
    </div>`;
}

function togT(i){cur.tasks[i].done=!cur.tasks[i].done;saveData();renderSB();renderT();}
function deleteTask(i){cur.tasks.splice(i,1);saveData();renderSB();renderT();}
function addT(){
  const e=document.getElementById('nt');if(!e.value.trim())return;
  const depVal=document.getElementById('t-dep').value;
  cur.tasks.push({id:Date.now(),text:e.value.trim(),done:false,priority:document.getElementById('t-pri').value,due:document.getElementById('t-due').value,dep:depVal?parseInt(depVal):null});
  e.value='';saveData();renderSB();renderT();
}
function editTask(i){
  const t=cur.tasks[i];
  const depOpts=`<option value="">依存なし</option>`+cur.tasks.filter((_,j)=>j!==i).map(x=>`<option value="${x.id}"${t.dep===x.id?' selected':''}>${x.text}</option>`).join('');
  showModal(`<h3>タスクを編集</h3>
    <div class="modal-field"><label>タスク名</label><input id="m-ttext" value="${t.text}"/></div>
    <div class="modal-field"><label>優先度</label><select id="m-tpri"><option value="high"${t.priority==='high'?' selected':''}>高</option><option value="mid"${t.priority==='mid'?' selected':''}>中</option><option value="low"${t.priority==='low'?' selected':''}>低</option></select></div>
    <div class="modal-field"><label>期日</label><input type="date" id="m-tdue" value="${t.due||''}"/></div>
    <div class="modal-field"><label>依存タスク（完了後に着手）</label><select id="m-tdep">${depOpts}</select></div>
    <div class="modal-btns"><button class="modal-ok" onclick="saveTask(${i})">保存</button><button class="modal-cancel" onclick="closeModal()">キャンセル</button></div>`);
}
function saveTask(i){
  const text=document.getElementById('m-ttext').value.trim();if(!text)return;
  const depVal=document.getElementById('m-tdep').value;
  cur.tasks[i]={...cur.tasks[i],text,priority:document.getElementById('m-tpri').value,due:document.getElementById('m-tdue').value,dep:depVal?parseInt(depVal):null};
  saveData();closeModal();renderT();
}

async function aiGenerateTasks(){
  const btn=document.querySelector('.ai-task-btn');btn.textContent='✦ 分析中...';btn.disabled=true;
  try{
    const prompt=`プロジェクト「${cur.name}」に必要なタスクを5〜7個提案してください。既存: ${cur.tasks.map(t=>t.text).join(', ')||'なし'}\nJSON形式のみ: {"tasks":[{"text":"タスク名","priority":"high|mid|low"}]}`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ckey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const txt=(d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    const existing=new Set(cur.tasks.map(t=>t.text));
    const newTasks=parsed.tasks.filter(t=>!existing.has(t.text));
    showModal(`<h3>✦ AIが提案するタスク</h3>
      <div style="display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;margin-bottom:14px">
        ${newTasks.map((t,i)=>{
          const pc={high:'pri-high',mid:'pri-mid',low:'pri-low'}[t.priority]||'pri-mid';
          return`<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #eee;border-radius:9px;cursor:pointer;background:#fff">
            <input type="checkbox" id="at-${i}" checked style="width:15px;height:15px;cursor:pointer"/>
            <span style="flex:1;font-size:13px;color:#1a1a1a">${t.text}</span>
            <span class="pri-badge ${pc}">${t.priority==='high'?'高':t.priority==='low'?'低':'中'}</span>
          </label>`;
        }).join('')}
      </div>
      <div class="modal-btns"><button class="modal-ok" onclick="applyAITasks('${encodeURIComponent(JSON.stringify(newTasks))}')">選択して追加</button><button class="modal-cancel" onclick="closeModal()">キャンセル</button></div>`);
  }catch(e){toast('AIタスク生成に失敗しました');}
  btn.textContent='✦ AIにタスクを提案してもらう';btn.disabled=false;
}
function applyAITasks(encoded){
  const tasks=JSON.parse(decodeURIComponent(encoded));
  const checkboxes=document.querySelectorAll('[id^="at-"]');
  checkboxes.forEach((cb,i)=>{if(cb.checked&&tasks[i])cur.tasks.push({id:Date.now()+i,text:tasks[i].text,done:false,priority:tasks[i].priority,due:'',dep:null});});
  saveData();closeModal();renderSB();renderT();toast('タスクを追加しました');
}

// ---- agents ----
function renderA(){
  const used=new Set(cur.agents.map(a=>a.id));
  const cards=cur.agents.map((a,i)=>{
    const s=ps(a);
    const mLabel=a.model==='gemini'?'Gemini':'Claude';
    const mClass=a.model==='gemini'?'model-gemini':'model-claude';
    return`<div class="ac"><div class="av" style="background:${s.bg};color:${s.c}">${ini(a.name)}</div>
      <div class="ai2"><div class="an">${a.name}</div><div class="ad">${a.desc}</div></div>
      <span class="model-badge ${mClass}">${mLabel}</span>
      <span class="abadge" style="background:${s.bg};color:${s.c}">稼働中</span>
      <div class="a-btns"><button class="a-btn" onclick="editAgent(${i})">✎</button><button class="a-btn del" onclick="remA(${i})">✕</button></div>
    </div>`;
  }).join('');

  let suggestHTML='';
  if(suggestion===null){suggestHTML=`<div class="ai-suggest-trigger" onclick="fetchSuggestion()"><span>✦</span><span>「${cur.name}」におすすめのチームをAIに提案</span></div>`;}
  else if(suggestion.loading){suggestHTML=`<div class="suggest-box"><div class="suggest-title">✦ チームを分析中<div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;}
  else if(suggestion.error){suggestHTML=`<div class="suggest-box"><div style="font-size:12px;color:#c00;margin-bottom:8px">APIエラー</div><button class="sug-dismiss" onclick="suggestion=null;renderA()">閉じる</button></div>`;}
  else{
    const rows=suggestion.agents.map(a=>{const s=PAL[a.pi??0];const al=used.has(a.id);return`<div class="suggest-agent-row" style="${al?'opacity:.5':''}"><div class="s-av" style="background:${s.bg};color:${s.c}">${ini(a.name)}</div><span class="s-an">${a.name}${al?' (参加済み)':''}</span><span class="s-ar">${a.suggestReason||''}</span></div>`;}).join('');
    suggestHTML=`<div class="suggest-box"><div class="suggest-title">✦ AIのおすすめチーム構成</div><div class="suggest-reason">${suggestion.reason||''}</div>${rows}<div class="suggest-btns"><button class="sug-apply" onclick="applySuggestion()">このチームで始める</button><button class="sug-dismiss" onclick="suggestion=null;renderA()">閉じる</button></div></div>`;
  }

  const chips=PRESETS.map(pr=>{const d=used.has(pr.id),s=PAL[pr.pi];return`<div class="pchip${d?' dis':''}" onclick="${d?'':'addPreset(\''+pr.id+'\')'}"><div style="width:16px;height:16px;border-radius:50%;background:${s.bg};margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:${s.c}">${ini(pr.name)}</div><div class="pchip-n">${pr.name}</div><div class="pchip-d">${pr.desc}</div></div>`;}).join('');
  const dots=PAL.map((c,i)=>`<div class="cdot${selPal===i?' sel':''}" style="background:${c.bg};border-color:${selPal===i?c.c:'transparent'}" onclick="selPalette(${i})"></div>`).join('');

  document.getElementById('panel-agents').innerHTML=
    suggestHTML+
    (cur.archived?`<div style="padding:8px 11px;background:#f9f8f5;border-radius:9px;font-size:12px;color:#888;margin-bottom:8px">📦 アーカイブ済み — エージェントの追加・編集は引き続き可能です</div>`:'')+ 
    (cur.agents.length?`<div class="slabel">現在のチーム</div>${cards}`:'<div style="font-size:12px;color:#ccc;margin-bottom:8px">まだエージェントがいません</div>')+
    `<div class="aas"><div style="font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:9px">エージェントを手動で追加</div>
      <div class="aatabs"><button class="aatab${amode==='preset'?' active':''}" onclick="setMode('preset')">プリセット (${PRESETS.length}種)</button><button class="aatab${amode==='custom'?' active':''}" onclick="setMode('custom')">カスタム</button></div>
      ${amode==='preset'?`<div class="pgrid">${chips}</div>`:`<div class="cf"><input id="cn" placeholder="エージェント名"/><input id="cd" placeholder="役割の説明"/><select id="cm" style="font-size:13px;padding:7px 10px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none"><option value="claude">Claude（分析・議論）</option><option value="gemini">Gemini（別視点・検索）</option></select><div class="slabel" style="margin-top:4px;margin-bottom:5px">カラー</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">${dots}</div><button onclick="addCustom()" style="padding:8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-weight:500">追加する</button></div>`}
    </div>`;
}

function setMode(m){amode=m;renderA();}
function selPalette(i){selPal=i;renderA();}
function remA(i){cur.agents.splice(i,1);saveData();renderA();}
function addPreset(id){const p=PRESETS.find(x=>x.id===id);if(!p)return;cur.agents.push(mk(p));saveData();renderA();}
function addCustom(){const n=document.getElementById('cn').value.trim(),d=document.getElementById('cd').value.trim(),m=document.getElementById('cm')?.value||'claude';if(!n)return;cur.agents.push({id:'c_'+Date.now(),name:n,desc:d||'カスタムエージェント',pi:selPal,model:m,custom:true});saveData();renderA();}
function editAgent(i){
  const a=cur.agents[i];
  const dots=PAL.map((c,idx)=>`<div class="cdot m-cdot${(a.pi??0)===idx?' sel':''}" style="background:${c.bg};border-color:${(a.pi??0)===idx?c.c:'transparent'}" data-idx="${idx}" onclick="document.querySelectorAll('.m-cdot').forEach(x=>{x.classList.remove('sel');x.style.borderColor='transparent';});this.classList.add('sel');this.style.borderColor='${c.c}'"></div>`).join('');
  showModal(`<h3>エージェントを編集</h3><div class="modal-field"><label>名前</label><input id="m-aname" value="${a.name}"/></div><div class="modal-field"><label>役割</label><textarea id="m-adesc">${a.desc}</textarea></div><div class="modal-field"><label>使用AI</label><select id="m-amodel"><option value="claude"${(a.model||'claude')==='claude'?' selected':''}>Claude（分析・議論）</option><option value="gemini"${a.model==='gemini'?' selected':''}>Gemini（別視点・検索）</option></select></div><div class="modal-field"><label>カラー</label><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">${dots}</div></div><div class="modal-btns"><button class="modal-ok" onclick="saveAgent(${i})">保存</button><button class="modal-cancel" onclick="closeModal()">キャンセル</button></div>`);
}
function saveAgent(i){
  const n=document.getElementById('m-aname').value.trim();const d=document.getElementById('m-adesc').value.trim();
  const selDot=document.querySelector('.m-cdot.sel');const pi=selDot?parseInt(selDot.dataset.idx):(cur.agents[i].pi||0);
  const model=document.getElementById('m-amodel')?.value||'claude';
  if(!n)return;cur.agents[i]={...cur.agents[i],name:n,desc:d,pi,model};saveData();closeModal();renderA();
}
async function fetchSuggestion(){
  suggestion={loading:true};renderA();
  const presetList=PRESETS.map(p=>`${p.id}:${p.name}(${p.desc})`).join(', ');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ckey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:500,messages:[{role:'user',content:`プロジェクト「${cur.name}」に最適なチームを提案。利用可能: ${presetList}\nJSON形式のみ: {"reason":"2〜3文","agents":[{"id":"id","reason":"一言"}]}\n3〜5名、idはリストにある値のみ`}]})});
    const d=await r.json();const txt=(d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    suggestion={loading:false,reason:parsed.reason,agents:parsed.agents.map(a=>{const p=PRESETS.find(x=>x.id===a.id);return p?{...mk(p),suggestReason:a.reason}:null;}).filter(Boolean)};
  }catch(e){suggestion={loading:false,error:true};}
  renderA();
}
function applySuggestion(){
  if(!suggestion?.agents)return;
  const used=new Set(cur.agents.map(a=>a.id));
  suggestion.agents.forEach(a=>{if(!used.has(a.id)){const{suggestReason,...ag}=a;cur.agents.push(ag);}});
  suggestion=null;saveData();renderA();toast('チームを追加しました');
}

// ---- chat ----
function renderC(){
  const panel=document.getElementById('panel-chat');panel.innerHTML='';
  const toolbar=document.createElement('div');toolbar.className='chat-toolbar';

  const btns=[
    {label:'AI同士で議論',fn:debate},
    {label:'議論を要約',fn:summarizeChat},
    {label:'リスク分析',fn:riskAnalysis},
  ];
  btns.forEach(b=>{const btn=document.createElement('button');btn.className='dbb';btn.textContent=b.label;btn.onclick=b.fn;toolbar.appendChild(btn);});

  const mpWrap=document.createElement('div');mpWrap.className='mention-picker';
  const mpBtn=document.createElement('button');mpBtn.className='dbb';mpBtn.textContent='@指名';mpBtn.onclick=()=>mpDrop.classList.toggle('open');
  const mpDrop=document.createElement('div');mpDrop.className='mention-dropdown';
  mpDrop.innerHTML=`<div class="mention-item" onclick="setMention(null)"><span>全員（ランダム）</span></div>`+
    cur.agents.map(a=>{const s=ps(a);return`<div class="mention-item" onclick="setMention('${a.id}')"><div class="m-av" style="background:${s.bg};color:${s.c}">${ini(a.name)}</div><span>${a.name}</span></div>`;}).join('');
  mpWrap.appendChild(mpBtn);mpWrap.appendChild(mpDrop);toolbar.appendChild(mpWrap);

  const mentionLabel=document.createElement('span');mentionLabel.id='mention-label';mentionLabel.style.cssText='font-size:11px;color:#7F77DD;font-weight:600;padding:3px 8px;background:#f0eeff;border-radius:7px;display:none';
  toolbar.appendChild(mentionLabel);

  const ca=document.createElement('div');ca.id='ca';ca.innerHTML=cur.chat.map(mh).join('');
  const ir=document.createElement('div');ir.className='cir';ir.innerHTML=`<input id="ci" placeholder="質問する (@指名で担当を絞れます)" onkeydown="if(event.key==='Enter')send()"/><button onclick="send()" id="sb">送信</button>`;

  panel.appendChild(toolbar);panel.appendChild(ca);panel.appendChild(ir);ca.scrollTop=ca.scrollHeight;
  document.addEventListener('click',e=>{if(!mpWrap.contains(e.target))mpDrop.classList.remove('open');});
}

function setMention(id){
  mentionTarget=id;
  document.querySelector('.mention-dropdown')?.classList.remove('open');
  const lbl=document.getElementById('mention-label');
  if(id){const a=cur.agents.find(x=>x.id===id);lbl.textContent=`@${a?.name||id}`;lbl.style.display='inline-block';}
  else lbl.style.display='none';
}

function mh(m){
  const u=m.role==='user',sum=m.role==='summary',risk=m.role==='risk';
  const s=u?{bg:'#E6F1FB',c:'#0C447C'}:sum?{bg:'#EEEDFE',c:'#3C3489'}:risk?{bg:'#FAEEDA',c:'#633806'}:ps(m.agent||{pi:0});
  const nm=u?'あなた':sum?'要約AI':risk?'リスク分析AI':m.aname;
  return`<div class="msg${u?' usr':''}${sum?' summary':''}${risk?' risk':''}"><div class="mav" style="background:${s.bg};color:${s.c}">${u?'あ':sum?'∑':risk?'⚠':ini(nm)}</div><div class="mb"><div class="mh2"><span class="mn">${nm}</span><span class="mt2">${m.time}</span></div><div class="mx">${m.text}</div></div></div>`;
}
function pushM(m){cur.chat.push(m);saveData();const ca=document.getElementById('ca');if(!ca)return;const d=document.createElement('div');d.innerHTML=mh(m);ca.appendChild(d.firstChild);ca.scrollTop=ca.scrollHeight;}
function showTyp(n){const ca=document.getElementById('ca');if(!ca)return;const d=document.createElement('div');d.id='typ';d.className='typ';d.innerHTML=`<span>${n}が入力中</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;ca.appendChild(d);ca.scrollTop=ca.scrollHeight;}
function remTyp(){const t=document.getElementById('typ');if(t)t.remove();}

async function callAg(agent,hist){
  const projName=cur?cur.name:'（プロジェクト未選択）';
  const taskList=cur?cur.tasks.map(t=>(t.done?'✓':'□')+t.text).join(', '):'なし';
  const sys=`あなたは「${agent.name}」(役割: ${agent.desc})。プロジェクト「${projName}」参加中。タスク: ${taskList}。50〜120字で日本語で答えてください。`;
  const keys=loadKeys();
  if(agent.model==='gemini'){
    const gkey=keys.gemini||'';
    if(!gkey){return '（Gemini APIキーが設定されていません。左下のAPI設定から入力してください）';}
    const contents=[{role:'user',parts:[{text:sys+'\n\n'+hist.map(h=>h.content).join('\n')}]}];
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+gkey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents,generationConfig:{maxOutputTokens:250}})});
    const d=await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'（応答なし）';
  }
  const ckey=keys.claude||'';
  if(!ckey){return '（Claude APIキーが設定されていません。左下のAPI設定から入力してください）';}
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ckey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:250,system:sys,messages:hist})});
  const d=await r.json();
  return d.content?.[0]?.text||'（応答なし）';
}

async function send(){
  if(thinking)return;const i=document.getElementById('ci');const txt=i.value.trim();if(!txt)return;i.value='';
  pushM({role:'user',aname:'あなた',text:txt,time:now()});
  thinking=true;document.getElementById('sb').disabled=true;
  const agents=cur.agents.length?cur.agents:[PRESETS[0]];
  const ag=mentionTarget?agents.find(a=>a.id===mentionTarget)||agents[0]:agents[Math.floor(Math.random()*agents.length)];
  showTyp(ag.name);
  try{const t=await callAg(ag,[{role:'user',content:txt}]);remTyp();pushM({role:'agent',agent:ag,aname:ag.name,text:t,time:now()});}
  catch(e){remTyp();pushM({role:'agent',agent:cur.agents[0]||PRESETS[0],aname:(cur.agents[0]||PRESETS[0]).name,text:'（APIエラー）',time:now()});}
  thinking=false;document.getElementById('sb').disabled=false;
}
async function debate(){
  if(thinking)return;
  const agents=cur.agents.length?cur.agents:[PRESETS[0]];
  const topic=`プロジェクト「${cur.name}」の現状と次のアクションについて、あなたの立場から意見を述べてください。`;
  pushM({role:'user',aname:'あなた',text:'AI同士の議論を開始：'+topic,time:now()});
  thinking=true;document.getElementById('sb').disabled=true;
  let hist=[{role:'user',content:topic}];
  for(const ag of agents){showTyp(ag.name);try{const t=await callAg(ag,hist);remTyp();pushM({role:'agent',agent:ag,aname:ag.name,text:t,time:now()});hist=[...hist,{role:'assistant',content:`[${ag.name}]: ${t}`}];}catch(e){remTyp();}}
  thinking=false;document.getElementById('sb').disabled=false;
}
async function summarizeChat(){
  if(thinking||cur.chat.length<2)return;
  thinking=true;document.getElementById('sb').disabled=true;showTyp('要約AI');
  try{
    const log=cur.chat.map(m=>`[${m.role==='user'?'あなた':m.aname}]: ${m.text}`).join('\n');
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ckey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:300,messages:[{role:'user',content:`以下のチャットを3〜5行で要約してください:\n${log}`}]})});
    const d=await r.json();remTyp();pushM({role:'summary',aname:'要約AI',text:d.content?.[0]?.text||'要約できませんでした',time:now()});
  }catch(e){remTyp();toast('要約に失敗しました');}
  thinking=false;document.getElementById('sb').disabled=false;
}
async function riskAnalysis(){
  if(thinking)return;
  thinking=true;document.getElementById('sb').disabled=true;showTyp('リスク分析AI');
  try{
    const info=`プロジェクト: ${cur.name}\nタスク: ${cur.tasks.map(t=>(t.done?'完了':'未完')+':'+t.text+(t.dep?'(依存あり)':'')).join(', ')}\nエージェント: ${cur.agents.map(a=>a.name).join(', ')}`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ckey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:350,messages:[{role:'user',content:`以下のプロジェクトのリスクを3点指摘し、対策を簡潔に提案してください:\n${info}`}]})});
    const d=await r.json();remTyp();pushM({role:'risk',aname:'リスク分析AI',text:d.content?.[0]?.text||'分析できませんでした',time:now()});
  }catch(e){remTyp();toast('リスク分析に失敗しました');}
  thinking=false;document.getElementById('sb').disabled=false;
}

// ---- toast ----
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ---- init ----
initKeys();
(async()=>{
  const loaded=await loadFromSheets();
  if(!loaded){
    // localStorageのデータをそのまま使用
  }
  renderSB();showDash();
})();
</script>
